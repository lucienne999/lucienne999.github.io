    <style>
        :root {
            --bg: #f3efe4;
            --surface: #fffaf0;
            --panel: #fffaf0;
            --border: rgba(23, 19, 15, 0.16);
            --text: #17130f;
            --muted: #756f62;
            --accent: #ff5a3d;
            --acid: #d7ff38;
            --accent-glow: rgba(255, 90, 61, 0.28);
            --hard-shadow: 10px 10px 0 #17130f;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "LXGW WenKai Screen", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .site-shell {
            background:
                linear-gradient(rgba(23, 19, 15, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(23, 19, 15, 0.045) 1px, transparent 1px),
                radial-gradient(circle at 16% 12%, rgba(215, 255, 56, 0.42), transparent 23rem),
                radial-gradient(circle at 82% 4%, rgba(255, 90, 61, 0.22), transparent 18rem),
                var(--bg);
            background-size: 34px 34px, 34px 34px, auto, auto;
        }

        .hero-line {
            font-family: "Bricolage Grotesque", "Space Grotesk", sans-serif;
            letter-spacing: -0.075em;
            line-height: 0.82;
        }

        .nav-dot {
            box-shadow: 0 0 0.35em var(--accent-glow);
        }

        .card-hover {
            transition: transform 0.25s ease, border-color 0.25s ease, background-color 0.25s ease, box-shadow 0.25s ease;
        }

        .card-hover:hover {
            transform: translate(-4px, -4px);
            border-color: rgba(23, 19, 15, 0.82);
            background-color: #fffdf6;
            box-shadow: var(--hard-shadow);
        }

        .glass-panel {
            background: rgba(255, 250, 240, 0.9);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            box-shadow: 0 16px 45px rgba(23, 19, 15, 0.12);
        }

        .studio-card {
            background: var(--panel);
            border: 1.5px solid var(--border);
            box-shadow: 0 18px 50px rgba(23, 19, 15, 0.08);
        }

        .hard-card {
            background: var(--panel);
            border: 2px solid var(--text);
            box-shadow: 8px 8px 0 var(--text);
        }

        .ink-panel {
            background: var(--text);
            color: var(--surface);
            border: 2px solid var(--text);
        }

        .ticker {
            border-top: 1.5px solid var(--text);
            border-bottom: 1.5px solid var(--text);
            background: var(--acid);
            color: var(--text);
        }

        .line-clamp-2,
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-2 {
            -webkit-line-clamp: 2;
        }

        .line-clamp-3 {
            -webkit-line-clamp: 3;
        }

        .prose-site {
            --tw-prose-body: #332d25;
            --tw-prose-headings: #17130f;
            --tw-prose-links: var(--accent);
            --tw-prose-bold: #17130f;
            --tw-prose-code: #17130f;
            --tw-prose-quotes: #332d25;
            --tw-prose-quote-borders: var(--accent);
            --tw-prose-hr: rgba(23, 19, 15, 0.16);
            --tw-prose-th-borders: rgba(23, 19, 15, 0.2);
            --tw-prose-td-borders: rgba(23, 19, 15, 0.1);
        }

        .prose-site h1,
        .prose-site h2,
        .prose-site h3 {
            font-family: "Bricolage Grotesque", "Space Grotesk", sans-serif;
            letter-spacing: -0.035em;
        }

        .prose-site blockquote {
            background: rgba(215, 255, 56, 0.2);
            border-radius: 1rem;
            padding: 1rem 1.25rem;
        }

        .prose-site table {
            background: var(--surface);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(23, 19, 15, 0.12);
        }

        .prose-site img {
            border: 1.5px solid var(--border);
            background: var(--surface);
        }

        .prose-site pre,
        .prose-site .code-block,
        .prose-site .mermaid {
            max-width: 100%;
        }

        .prose-site .mermaid {
            overflow-x: auto;
        }

        /* Prevent typography plugin from styling syntax highlighter lines as inline code */
        .prose .code-block pre,
        .prose .code-block code {
            background-color: transparent !important;
            border-radius: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            box-shadow: none !important;
            font-weight: inherit;
        }

        .prose .code-block pre::before,
        .prose .code-block code::before,
        .prose .code-block pre::after,
        .prose .code-block code::after {
            content: none !important;
        }
    </style>
